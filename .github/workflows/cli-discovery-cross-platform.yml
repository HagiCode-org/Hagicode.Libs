name: CLI Invocation Error Contract Cross-Platform

on:
  push:
    paths:
      - '.github/workflows/cli-discovery-cross-platform.yml'
      - 'src/**'
      - 'tests/**'
      - 'README.md'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '*.slnx'
  pull_request:
    paths:
      - '.github/workflows/cli-discovery-cross-platform.yml'
      - 'src/**'
      - 'tests/**'
      - 'README.md'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '*.slnx'
  workflow_dispatch:

env:
  HAGICODE_REAL_CLI_TESTS: '1'
  HAGICODE_REAL_CLI_COPILOT_SESSION_TESTS: '0'

jobs:
  cli-invocation-contract:
    name: '${{ matrix.name }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'ubuntu-latest real CLI invocation error contract'
            os: ubuntu-latest
          - name: 'macos-latest real CLI invocation error contract'
            os: macos-latest
          - name: 'windows-latest real CLI invocation error contract'
            os: windows-latest
          - name: 'windows-latest zh-CN real CLI invocation error contract'
            os: windows-latest
            locale: zh-CN
            dotnet_cli_ui_language: zh-CN
            lang: zh_CN.UTF-8
            lc_all: zh_CN.UTF-8

    env:
      DOTNET_CLI_UI_LANGUAGE: ${{ matrix.dotnet_cli_ui_language || '' }}
      LANG: ${{ matrix.lang || '' }}
      LC_ALL: ${{ matrix.lc_all || '' }}
      HAGICODE_WINDOWS_TEST_LOCALE: ${{ matrix.locale || '' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log runner context
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Image OS: $ImageOS"
          echo "Dotnet setup will use $(cat global.json | tr -d '\n')"
          node --version || true
          npm --version || true
          dotnet --info || true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Configure Windows zh-CN locale hints
        if: runner.os == 'Windows' && matrix.locale == 'zh-CN'
        shell: pwsh
        run: |
          chcp.com 65001
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          "DOTNET_CLI_UI_LANGUAGE=zh-CN" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LANG=zh_CN.UTF-8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LC_ALL=zh_CN.UTF-8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HAGICODE_WINDOWS_TEST_LOCALE=zh-CN" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Configured zh-CN locale hints for Windows integration test lane."

      - name: Diagnose Windows zh-CN Claude CLI environment before install
        if: runner.os == 'Windows' && matrix.locale == 'zh-CN'
        shell: pwsh
        run: |
          function Show-CommandDiagnostics {
            param([string]$CommandName)

            Write-Host "---- where.exe $CommandName ----"
            $whereOutput = & where.exe $CommandName 2>&1
            $whereExitCode = $LASTEXITCODE
            if ($whereOutput) {
              $whereOutput | ForEach-Object { Write-Host $_ }
            }
            else {
              Write-Host "(no output)"
            }

            if ($whereExitCode -ne 0) {
              Write-Host "where.exe did not find $CommandName (exit code $whereExitCode)."
            }

            $global:LASTEXITCODE = 0

            Write-Host "---- Get-Command $CommandName -All ----"
            $command = Get-Command $CommandName -All -ErrorAction SilentlyContinue
            if ($null -eq $command) {
              Write-Host "$CommandName not found via Get-Command."
              return
            }

            $command | Format-List Name, CommandType, Source, Definition, Path
          }

          Write-Host "---- Windows zh-CN pre-install diagnostics ----"
          Write-Host "PATH=$env:PATH"
          Write-Host "ComSpec=$env:ComSpec"
          Write-Host "DOTNET_CLI_UI_LANGUAGE=$env:DOTNET_CLI_UI_LANGUAGE"
          Write-Host "HAGICODE_WINDOWS_TEST_LOCALE=$env:HAGICODE_WINDOWS_TEST_LOCALE"

          Write-Host "---- chcp ----"
          chcp.com

          Write-Host "---- [Console]::InputEncoding ----"
          [Console]::InputEncoding | Format-List *

          Write-Host "---- [Console]::OutputEncoding ----"
          [Console]::OutputEncoding | Format-List *

          Write-Host "---- Get-Culture ----"
          Get-Culture | Format-List *

          Write-Host "---- Get-UICulture ----"
          Get-UICulture | Format-List *

          Show-CommandDiagnostics "claude"
          Show-CommandDiagnostics "claude.cmd"

      - name: Install CI CLIs
        run: |
          echo "Installing CI CLIs on ${RUNNER_OS}"
          echo "Locale hints: DOTNET_CLI_UI_LANGUAGE=${DOTNET_CLI_UI_LANGUAGE:-<unset>} LANG=${LANG:-<unset>} LC_ALL=${LC_ALL:-<unset>}"
          dotnet run --project src/HagiCode.Libs.CiSetup.Console -- --install

      - name: Diagnose Windows zh-CN Claude CLI environment after install
        if: runner.os == 'Windows' && matrix.locale == 'zh-CN'
        shell: pwsh
        run: |
          function Show-CommandDiagnostics {
            param([string]$CommandName)

            Write-Host "---- where.exe $CommandName ----"
            $whereOutput = & where.exe $CommandName 2>&1
            $whereExitCode = $LASTEXITCODE
            if ($whereOutput) {
              $whereOutput | ForEach-Object { Write-Host $_ }
            }
            else {
              Write-Host "(no output)"
            }

            if ($whereExitCode -ne 0) {
              Write-Host "where.exe did not find $CommandName (exit code $whereExitCode)."
            }

            $global:LASTEXITCODE = 0

            Write-Host "---- Get-Command $CommandName -All ----"
            $command = Get-Command $CommandName -All -ErrorAction SilentlyContinue
            if ($null -eq $command) {
              Write-Host "$CommandName not found via Get-Command."
              return
            }

            $command | Format-List Name, CommandType, Source, Definition, Path
          }

          Write-Host "---- Windows zh-CN post-install diagnostics ----"
          Write-Host "PATH=$env:PATH"
          Write-Host "ComSpec=$env:ComSpec"

          Write-Host "---- chcp ----"
          chcp.com

          Write-Host "---- [Console]::InputEncoding ----"
          [Console]::InputEncoding | Format-List *

          Write-Host "---- [Console]::OutputEncoding ----"
          [Console]::OutputEncoding | Format-List *

          Show-CommandDiagnostics "claude"
          Show-CommandDiagnostics "claude.cmd"

      - name: Restore HagiCode.Libs solution
        run: |
          echo "Restoring HagiCode.Libs.slnx on ${RUNNER_OS}"
          dotnet restore HagiCode.Libs.slnx

      - name: Run real CLI invocation error contract tests
        run: |
          echo "Running real CLI invocation error contract tests on ${RUNNER_OS}"
          dotnet test tests/HagiCode.Libs.Providers.Tests/HagiCode.Libs.Providers.Tests.csproj \
            --no-restore \
            --filter "Category=RealCliInvocationContract" \
            --logger "console;verbosity=normal"

      - name: Run Windows zh-CN real Claude whitespace shim regression
        if: runner.os == 'Windows' && matrix.locale == 'zh-CN'
        run: |
          echo "Running Windows zh-CN Claude whitespace shim regression on ${RUNNER_OS}"
          dotnet test tests/HagiCode.Libs.Providers.Tests/HagiCode.Libs.Providers.Tests.csproj \
            --no-restore \
            --filter "FullyQualifiedName~ExecuteAsync_real_cli_windows_zh_cn_whitespace_cmd_shim_surfaces_actionable_failure_without_mojibake" \
            --logger "console;verbosity=normal"
