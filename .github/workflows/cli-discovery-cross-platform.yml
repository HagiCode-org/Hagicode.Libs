name: CLI Invocation Error Contract Cross-Platform

on:
  push:
    paths:
      - '.github/workflows/cli-discovery-cross-platform.yml'
      - 'src/**'
      - 'tests/**'
      - 'README.md'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '*.slnx'
  pull_request:
    paths:
      - '.github/workflows/cli-discovery-cross-platform.yml'
      - 'src/**'
      - 'tests/**'
      - 'README.md'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '*.slnx'
  workflow_dispatch:

env:
  HAGICODE_REAL_CLI_TESTS: '1'
  HAGICODE_REAL_CLI_COPILOT_SESSION_TESTS: '0'

jobs:
  cli-invocation-contract:
    name: '${{ matrix.name }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'ubuntu-latest real CLI invocation error contract'
            os: ubuntu-latest
          - name: 'macos-latest real CLI invocation error contract'
            os: macos-latest
          - name: 'windows-latest real CLI invocation error contract'
            os: windows-latest
          - name: 'windows-latest zh-CN real CLI invocation error contract'
            os: windows-latest
            locale: zh-CN
            dotnet_cli_ui_language: zh-CN
            lang: zh_CN.UTF-8
            lc_all: zh_CN.UTF-8

    env:
      DOTNET_CLI_UI_LANGUAGE: ${{ matrix.dotnet_cli_ui_language || '' }}
      LANG: ${{ matrix.lang || '' }}
      LC_ALL: ${{ matrix.lc_all || '' }}
      HAGICODE_WINDOWS_TEST_LOCALE: ${{ matrix.locale || '' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log runner context
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Image OS: $ImageOS"
          echo "Dotnet setup will use $(cat global.json | tr -d '\n')"
          node --version || true
          npm --version || true
          dotnet --info || true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Configure Windows zh-CN locale hints
        if: runner.os == 'Windows' && matrix.locale == 'zh-CN'
        shell: pwsh
        run: |
          chcp.com 65001
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          "DOTNET_CLI_UI_LANGUAGE=zh-CN" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LANG=zh_CN.UTF-8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LC_ALL=zh_CN.UTF-8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HAGICODE_WINDOWS_TEST_LOCALE=zh-CN" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Configured zh-CN locale hints for Windows integration test lane."

      - name: Install CI CLIs
        run: |
          echo "Installing CI CLIs on ${RUNNER_OS}"
          echo "Locale hints: DOTNET_CLI_UI_LANGUAGE=${DOTNET_CLI_UI_LANGUAGE:-<unset>} LANG=${LANG:-<unset>} LC_ALL=${LC_ALL:-<unset>}"
          dotnet run --project src/HagiCode.Libs.CiSetup.Console -- --install

      - name: Restore HagiCode.Libs solution
        run: |
          echo "Restoring HagiCode.Libs.slnx on ${RUNNER_OS}"
          dotnet restore HagiCode.Libs.slnx

      - name: Run real CLI invocation error contract tests
        run: |
          echo "Running real CLI invocation error contract tests on ${RUNNER_OS}"
          dotnet test tests/HagiCode.Libs.Providers.Tests/HagiCode.Libs.Providers.Tests.csproj \
            --no-restore \
            --filter "Category=RealCliInvocationContract" \
            --logger "console;verbosity=normal"
